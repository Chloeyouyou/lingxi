// 串行生成 N 个不重复步骤
async function generateUniqueSteps(wish, depth, doneCount, count = 3) {
    const results = [];
    for (let i = 0; i < count; i++) {
        const step = await callWishRefill(wish, depth, doneCount, results);
        if (step) results.push(step);
    }
    return results;
}

// ── 进入方向选择阶段 ──
function enterDirectionsPhase(directions) {
    document.getElementById('wbInputArea').style.display = 'none';
    document.getElementById('wbDirectionsArea').style.display = 'block';
    document.getElementById('wbScopeArea').style.display = 'none';
    document.getElementById('wbStepsArea').style.display = 'none';
    const label = document.getElementById('wbDirWishLabel');
    if (label) label.textContent = `"${wishBottleData.wish}"`;
    if (directions) renderDirections(directions);
    else if (wishBottleData._directions) renderDirections(wishBottleData._directions);
}

function renderDirections(directions) {
    wishBottleData._directions = directions;
    const list = document.getElementById('wbDirList');
    list.innerHTML = '';
    directions.forEach(dir => {
        const btn = document.createElement('button');
        btn.className = 'wb-dir-btn';
        btn.textContent = dir;
        btn.addEventListener('click', async () => {
            list.querySelectorAll('.wb-dir-btn').forEach(b => b.disabled = true);
            btn.textContent = dir + ' ···';
            wishBottleData.chosenDirection = dir;
            wishBottleData.phase = 'scoping';
            saveWishBottleProgress();
            try {
                const scope = await callWishScope(wishBottleData.wish, dir);
                wishBottleData.scope = scope;
                wishBottleData.depth = scope.depth || 'long';
                wishBottleData.depthLabel = scope.depthLabel || '';
                saveWishBottleProgress();
                enterScopingPhase();
            } catch (e) {
                console.error('[WishDirections]', e);
                list.querySelectorAll('.wb-dir-btn').forEach(b => { b.disabled = false; });
                btn.textContent = dir;
            }
        });
        list.appendChild(btn);
    });

    // 自定义方向输入行
    const customRow = document.createElement('div');
    customRow.className = 'wb-dir-custom';
    const customInput = document.createElement('input');
    customInput.type = 'text';
    customInput.placeholder = '或者，用自己的话说说方向…';
    const customBtn = document.createElement('button');
    customBtn.textContent = '确定';

    async function submitCustomDir() {
        const dir = customInput.value.trim();
        if (!dir) return;
        list.querySelectorAll('.wb-dir-btn, .wb-dir-custom button, .wb-dir-custom input').forEach(el => el.disabled = true);
        customBtn.textContent = '···';
        wishBottleData.chosenDirection = dir;
        wishBottleData.phase = 'scoping';
        saveWishBottleProgress();
        try {
            const scope = await callWishScope(wishBottleData.wish, dir);
            wishBottleData.scope = scope;
            wishBottleData.depth = scope.depth || 'long';
            wishBottleData.depthLabel = scope.depthLabel || '';
            saveWishBottleProgress();
            enterScopingPhase();
        } catch (e) {
            console.error('[WishDirections custom]', e);
            list.querySelectorAll('.wb-dir-btn, .wb-dir-custom button, .wb-dir-custom input').forEach(el => el.disabled = false);
            customBtn.textContent = '确定';
        }
    }

    customBtn.addEventListener('click', submitCustomDir);
    customInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitCustomDir(); });
    customRow.appendChild(customInput);
    customRow.appendChild(customBtn);
    list.appendChild(customRow);
}

// ── 进入大纲阶段 ──
function enterScopingPhase() {
    document.getElementById('wbInputArea').style.display = 'none';
    document.getElementById('wbDirectionsArea').style.display = 'none';
    document.getElementById('wbScopeArea').style.display = 'block';

function renderScope() {
    const content = document.getElementById('wbScopeContent');

    const rows = wishBottleData.depth === 'short'

            { icon: '◈', label: '近期里程碑', text: scope.milestone },

        const row = document.createElement('div');
        row.className = 'wb-scope-row';
        row.innerHTML = `<span class="wb-scope-icon">${r.icon}</span><div><div class="wb-scope-label">${r.label}</div><div class="wb-scope-text">${r.text}</div></div>`;
        content.appendChild(row);
    });

    if (wishBottleData.chosenDirection) {
        const dirNote = document.createElement('div');
        dirNote.style.cssText = 'font-size:0.72rem;color:rgba(196,149,106,0.45);margin-top:14px;letter-spacing:0.04em;';
        dirNote.textContent = `方向：${wishBottleData.chosenDirection}`;
        content.appendChild(dirNote);
    }
}

// ── 进入活跃阶段（链式执行）──
function enterActivePhase() {
    document.getElementById('wbDirectionsArea').style.display = 'none';
    document.getElementById('wbScopeArea').style.display = 'none';
    document.getElementById('wbStepsArea').style.display = 'block';
    const tagEl = document.getElementById('wbDepthTag');

            ? `<span class="wb-depth-tag ${isShort ? 'wb-depth-short' : 'wb-depth-long'}">${isShort ? '一次释放' : '长期目标'} · ${wishBottleData.depthLabel}</span>`
            : '';
    }
    if (wishBottleData.phase === 'done') {
        renderDoneActiveSteps();
    } else {
        renderActiveSteps();
    }
}

// ── 渲染链式活跃视图 ──
function renderActiveSteps() {
    const list = document.getElementById('wbStepsList');
    const label = document.getElementById('wbWishLabel');
    if (label) label.textContent = `"${wishBottleData.wish}"`;
    list.innerHTML = '';

    const doneSteps = wishBottleData.steps.filter(s => s.status === 'done');
    const pendingSteps = wishBottleData.steps.filter(s => s.status === 'pending');
    const doneCount = doneSteps.length;

    // 链式进度
    if (doneCount > 0) {
        const counter = document.createElement('div');
        counter.className = 'wb-chain-counter';
        counter.textContent = `✦ 已完成 ${doneCount} 步，继续前进…`;
        list.appendChild(counter);
    } else {
        const hint = document.createElement('div');
        hint.style.cssText = 'font-size:0.78rem;color:rgba(255,255,255,0.28);margin-bottom:16px;letter-spacing:0.04em;';
        hint.textContent = '🔓 候选步骤可对话修改或换掉；锁定后才能执行或标记完成。';
        list.appendChild(hint);
    }

    // 已完成的步骤（最多显示最近3条，淡化）
    doneSteps.slice(-3).forEach(step => {
        const li = document.createElement('div');
        li.className = 'wb-step wb-done';
        const num = document.createElement('span');
        num.className = 'wb-step-num';
        num.textContent = '✦';
        const txt = document.createElement('span');
        txt.className = 'wb-step-text';
        txt.textContent = step.text;
        li.appendChild(num); li.appendChild(txt);
        list.appendChild(li);
    });

    // 待处理步骤（上限3个）
    pendingSteps.forEach(step => {
        const globalIdx = wishBottleData.steps.indexOf(step);
        const li = document.createElement('div');
        if (step.locked) {
            li.className = 'wb-step wb-locked';
        } else {
            li.className = 'wb-step wb-candidate';
        }

        const num = document.createElement('span');
        num.className = 'wb-step-num';
        num.textContent = globalIdx + 1;

        const txt = document.createElement('span');
        txt.className = 'wb-step-text';
        txt.textContent = step.text;

        // 锁定/解锁按钮
        const lockBtn = document.createElement('button');
        lockBtn.className = 'wb-lock-btn' + (step.locked ? ' locked' : '');
        lockBtn.title = step.locked ? '解锁（变回候选状态）' : '锁定，开始执行';
        lockBtn.textContent = step.locked ? '🔒' : '🔓';
        lockBtn.addEventListener('click', () => {
            wishBottleData.steps[globalIdx].locked = !wishBottleData.steps[globalIdx].locked;
            saveWishBottleProgress();
            renderActiveSteps();
        });

        // 回溯按钮
        const undoBtn = document.createElement('button');
        undoBtn.className = 'wb-undo-btn';
        undoBtn.textContent = '↩';
        undoBtn.style.display = (step.history && step.history.length > 0) ? '' : 'none';
        undoBtn.title = step.history?.[0] ? `恢复：${step.history[0]}` : '';
        undoBtn.addEventListener('click', () => {
            if (!wishBottleData.steps[globalIdx].history?.length) return;
            const prev = wishBottleData.steps[globalIdx].history[0];
            wishBottleData.steps[globalIdx].history = wishBottleData.steps[globalIdx].history.slice(1);
            wishBottleData.steps[globalIdx].text = prev;
            saveWishBottleProgress();
            renderActiveSteps();
        });

        li.appendChild(num);
        li.appendChild(txt);
        li.appendChild(undoBtn);
        li.appendChild(lockBtn);

        if (step.locked) {
            // 执行中：✅ 完成了 + ✗ 做不到
            const btns = document.createElement('div');
            btns.className = 'wb-step-btns';

            const doneBtn = document.createElement('button');
            doneBtn.className = 'wb-btn wb-btn-done';
            doneBtn.textContent = '✅ 完成了';
            doneBtn.addEventListener('click', () => {
                const stepText = wishBottleData.steps[globalIdx].text;
                const noteText = noteInput ? noteInput.value.trim() : '';
                wishBottleData.steps[globalIdx].status = 'done';
                wishBottleData.steps[globalIdx].locked = false;
                saveWishBottleProgress();
                if (noteText) dbSaveWishNote(noteText, stepText);
                renderActiveSteps();
                setTimeout(() => generateWishReceipt(stepText), 400);
                autoRefill();
            });

            const failBtn = document.createElement('button');
            failBtn.className = 'wb-btn wb-btn-fail';
            failBtn.textContent = '✗ 做不到';
            failBtn.addEventListener('click', async () => {
                failBtn.disabled = true;
                failBtn.textContent = '换方向…';
                const old = wishBottleData.steps[globalIdx].text;
                const noteText = noteInput ? noteInput.value.trim() : '';
                if (noteText) dbSaveWishNote(noteText, old);
                try {
                    const result = await callWishAvoid(wishBottleData.wish, old);
                    if (result.avoidTag && !avoidTypes.includes(result.avoidTag)) {
                        avoidTypes.push(result.avoidTag);
                        saveAvoidTypes();
                    }
                    if (result.newStep) {
                        wishBottleData.steps[globalIdx].history = [old, ...(wishBottleData.steps[globalIdx].history || [])];
                        wishBottleData.steps[globalIdx].text = result.newStep;
                        wishBottleData.steps[globalIdx].locked = false;
                    }
                } catch { failBtn.disabled = false; failBtn.textContent = '✗ 做不到'; return; }
                saveWishBottleProgress();
                renderActiveSteps();
            });

            btns.appendChild(doneBtn);
            btns.appendChild(failBtn);
            li.appendChild(btns);

            // 反馈输入行
            const noteRow = document.createElement('div');
            noteRow.className = 'wb-step-note';
            const noteInput = document.createElement('input');
            noteInput.type = 'text';
            noteInput.placeholder = '加点想法？（可选，按回车保存）';
            noteInput.addEventListener('keydown', e => {
                if (e.key === 'Enter') {
                    const t = noteInput.value.trim();
                    if (t) { dbSaveWishNote(t, step.text); noteInput.value = ''; noteInput.placeholder = '已记录 ✦'; }
                }
            });
            noteRow.appendChild(noteInput);
            li.appendChild(noteRow);
        } else {
            // 候选：换一个
            const swapBtn = document.createElement('button');
            swapBtn.className = 'wb-confirm-btn';
            swapBtn.textContent = '换';
            swapBtn.addEventListener('click', async () => {
                swapBtn.disabled = true;
                swapBtn.textContent = '…';
                try {
                    const replacement = await callWishReplace(wishBottleData.wish, step.text);
                    if (replacement) {
                        const old = wishBottleData.steps[globalIdx].text;
                        wishBottleData.steps[globalIdx].history = [old, ...(wishBottleData.steps[globalIdx].history || [])];
                        wishBottleData.steps[globalIdx].text = replacement;
                        saveWishBottleProgress();
                        renderActiveSteps();
                    }
                } catch { swapBtn.disabled = false; swapBtn.textContent = '换'; }
            });
            li.appendChild(swapBtn);
        }

        list.appendChild(li);
    });

    // 结束按钮
    const endBtn = document.createElement('button');
    endBtn.id = 'wbEndBtn';
    endBtn.textContent = '结束本次行动';
    endBtn.addEventListener('click', () => showActiveConclusion());
    list.appendChild(endBtn);
}

// ── 自动补充候选步骤（完成一步后触发）──
async function autoRefill() {
    const pending = wishBottleData.steps.filter(s => s.status === 'pending');
    if (pending.length >= 3) return;

    // 加载提示
    const list = document.getElementById('wbStepsList');
    const endBtn = document.getElementById('wbEndBtn');
    const hint = document.createElement('div');
    hint.className = 'wb-refill-hint';
    hint.id = 'wbRefillHint';
    hint.textContent = '正在生成新的候选步骤…';
    if (endBtn) list.insertBefore(hint, endBtn);
    else list.appendChild(hint);

    try {
        const doneCount = wishBottleData.steps.filter(s => s.status === 'done').length;
        const existingPending = wishBottleData.steps.filter(s => s.status === 'pending').map(s => s.text);
        const newText = await callWishRefill(wishBottleData.wish, wishBottleData.depth, doneCount, existingPending);
        if (newText) {
            wishBottleData.steps.push({ text: newText, status: 'pending', locked: false, history: [] });
            saveWishBottleProgress();
            renderActiveSteps();
            return;
        }
    } catch (e) {
        console.error('[autoRefill]', e);
    }
    document.getElementById('wbRefillHint')?.remove();
}

// ── 结束行动：显示总结 ──
async function showActiveConclusion() {
    wishBottleData.phase = 'done';
    saveWishBottleProgress();
    renderDoneActiveSteps();

    const reflectEl = document.getElementById('wbReflectArea');
    if (reflectEl) {
        reflectEl.style.display = 'block';
        reflectEl.textContent = '…';
        try {
            const reflection = await callWishReflect(wishBottleData.wish, wishBottleData.depth);
            reflectEl.textContent = reflection;
        } catch { reflectEl.style.display = 'none'; }
    }
}

// ── 渲染已结束的行动视图 ──
function renderDoneActiveSteps() {
    const list = document.getElementById('wbStepsList');
    const label = document.getElementById('wbWishLabel');
    if (label) label.textContent = `"${wishBottleData.wish}"`;
    list.innerHTML = '';

    const doneSteps = wishBottleData.steps.filter(s => s.status === 'done');

    const msg = document.createElement('div');
    msg.style.cssText = 'text-align:center;padding:20px 0 16px;color:rgba(196,149,106,0.9);font-size:0.95rem;letter-spacing:0.08em;';
    msg.textContent = `✦  完成了 ${doneSteps.length} 步。`;
    list.appendChild(msg);

    doneSteps.forEach(step => {
        const li = document.createElement('div');
        li.className = 'wb-step wb-done';
        const num = document.createElement('span');
        num.className = 'wb-step-num';
        num.textContent = '✦';
        const txt = document.createElement('span');
        txt.className = 'wb-step-text';
        txt.textContent = step.text;
        li.appendChild(num); li.appendChild(txt);
        list.appendChild(li);
    });

    // 长期目标提供行动报告
    if (wishBottleData.depth === 'long') {
        const reportBtn = document.createElement('button');
        reportBtn.id = 'wbReportBtn';
        reportBtn.textContent = '生成行动报告';
        reportBtn.addEventListener('click', async () => {
            reportBtn.disabled = true;
            reportBtn.textContent = '生成中…';
            const reportEl = document.getElementById('wbReportArea');
            reportEl.style.display = 'block';
            reportEl.textContent = '…';
            try {
                reportEl.textContent = await callWishReport();
            } catch { reportEl.textContent = '生成失败，请稍后再试。'; }
            reportBtn.remove();
        });
        list.appendChild(reportBtn);
    }

    // 继续行动 + 归档完成
    const doneActions = document.createElement('div');
    doneActions.className = 'wb-done-actions';

    const continueBtn = document.createElement('button');
    continueBtn.className = 'wb-continue-btn';
    continueBtn.textContent = '继续行动 →';
    continueBtn.addEventListener('click', async () => {
        continueBtn.disabled = true;
        continueBtn.textContent = '生成新步骤…';
        try {
            const doneCount = wishBottleData.steps.filter(s => s.status === 'done').length;
            const results = await generateUniqueSteps(wishBottleData.wish, wishBottleData.depth, doneCount);
            const newSteps = results.filter(Boolean).map(text => ({ text, status: 'pending', locked: false, history: [] }));
            if (!newSteps.length) throw new Error('no steps');
            // 保留已完成步骤，追加新候选步骤
            wishBottleData.steps = [
                ...wishBottleData.steps.filter(s => s.status === 'done'),
                ...newSteps
            ];
            wishBottleData.phase = 'active';
            saveWishBottleProgress();
            enterActivePhase();
        } catch {
            continueBtn.disabled = false;
            continueBtn.textContent = '继续行动 →';
        }
    });

    const archiveBtn = document.createElement('button');
    archiveBtn.className = 'wb-archive-btn';
    archiveBtn.textContent = '归档完成';
    archiveBtn.addEventListener('click', async () => {
        archiveBtn.disabled = true;
        archiveBtn.textContent = '归档中…';
        try {
            await dbWishSessionSave();
            archiveBtn.textContent = '已归档 ✦';
        } catch {
            archiveBtn.disabled = false;
            archiveBtn.textContent = '归档完成';
        }
    });

    doneActions.appendChild(continueBtn);
    doneActions.appendChild(archiveBtn);
    list.appendChild(doneActions);
}

async function callWishReport() {
    const doneSteps = wishBottleData.steps.filter(s => s.status === 'done');
    const stepLines = doneSteps.map((s, i) => `第${i+1}步：${s.text}`).join('\n');
    const avoidNote = avoidTypes.length > 0 ? `\n用户回避的类型：${avoidTypes.join('、')}` : '';
    const chatLines = (wishBottleData.chatHistory || [])
        .map(m => `${m.role === 'ai' ? '灵犀' : '你'}：${m.content}`).join('\n');

    const body = {
        model: 'deepseek-chat', stream: false, max_tokens: 500,
        messages: [
            {
                role: 'system',
                content: '你是灵犀。根据用户完成愿望瓶步骤的过程，生成一份简短的行动报告（200字以内）。格式：第一段说明愿望；第二段列出所有完成的步骤；如有回避类型则第三段轻轻提一句这个人倾向于回避什么；最后给一句灵犀的话。语气温柔，不套话。'
            },
            { role: 'user', content: `愿望："${wishBottleData.wish}"\n类型：${wishBottleData.depth === 'short' ? '短期释放' : '长期目标'}·${wishBottleData.depthLabel}\n\n完成的步骤：\n${stepLines}${avoidNote}\n\n对话摘录：\n${chatLines || '（无对话记录）'}` }
        ]
    };
    const resp = await fetch(API_URL + '/chat', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
    });
    const data = await resp.json();
    return data?.choices?.[0]?.message?.content?.trim() || '';
}

// ══════════════════════════════════════════════════
//  愿望瓶迷你对话
// ══════════════════════════════════════════════════

async function callWishChat(userMsg) {
    const pendingSteps = wishBottleData.steps
        .map((s, i) => ({ ...s, num: i + 1 }))
        .filter(s => s.status === 'pending');
    const stepsSummary = pendingSteps.length
        ? pendingSteps.map(s => `步骤${s.num}（${s.locked ? '执行中/已锁定' : '候选/未锁定'}）：${s.text}`).join('\n')
        : '（暂无待处理步骤）';

    const basePrompt = WB_PROMPT;

    const scope = wishBottleData.scope;
    const scopeBlock = scope
        ? `\n目标框架：${scope.goal || ''}${scope.milestone ? ' → 近期里程碑：' + scope.milestone : ''}${scope.weeklyAction ? '\n本周方向：' + scope.weeklyAction : ''}`
        : '';
    const dirBlock = wishBottleData.chosenDirection ? `\n用户选定的方向：${wishBottleData.chosenDirection}` : '';

    const wishContext = `
──── 愿望瓶上下文（仅供参考，不要主动提起，除非用户说到） ────
用户正在通过愿望瓶处理一个愿望："${wishBottleData.wish}"
类型：${wishBottleData.depth === 'short' ? '短期释放' : '长期目标'}${dirBlock}${scopeBlock}
当前步骤：
${stepsSummary}

如果用户明确提出要修改某个步骤，且该步骤是"候选/未锁定"状态，在回复正文末尾追加一行：
[UPDATE:步骤序号:新步骤文字（≤20字，具体可执行）]
例：[UPDATE:2:打开手机备忘录，写下脑子里最近的一件事]
执行中/已锁定的步骤不能修改。如无需更新步骤，不加此标记。`;

    // 带上历史（排除最后一条即刚 push 的 userMsg，避免重复）
    const historyMsgs = (wishBottleData.chatHistory || [])
        .slice(0, -1)
        .slice(-20)
        .map(m => ({ role: m.role === 'ai' ? 'assistant' : 'user', content: m.content }));

    const body = {
        model: 'deepseek-chat', stream: false, max_tokens: 300,
        messages: [
            { role: 'system', content: basePrompt + wishContext },
            ...(userSummary ? [{ role: 'system', content: `用户近期画像：${userSummary}` }] : []),
            ...historyMsgs,
            { role: 'user', content: userMsg }
        ]
    };
    const resp = await fetch(API_URL + '/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });
    const data = await resp.json();
    let raw = (data?.choices?.[0]?.message?.content || '').trim();

    // 解析 [UPDATE:N:text] 标记
    const updateMatch = raw.match(/\[UPDATE:(\d+):(.+?)\]/);
    let update = null;
    if (updateMatch) {
        const num = parseInt(updateMatch[1]);
        const newText = updateMatch[2].trim();
        // 找到对应的全局 index
        const target = wishBottleData.steps.find((s, i) => i + 1 === num && s.status === 'pending' && !s.locked);
        if (target) {
            update = { index: wishBottleData.steps.indexOf(target), text: newText };
        }
        raw = raw.replace(/\[UPDATE:\d+:.+?\]/, '').trim();
    }

    // 剥离系统标记（[STRESS:X] [SKETCH:...] 等），不显示给用户
    const reply = raw.replace(/\[(STRESS|SKETCH|USED_IMAGE|CRISIS|WISH)[^\]]*\]/g, '').trim();

    return { reply, update };
}

function appendWbChatMsg(role, content) {
    const box = document.getElementById('wbChatMessages');
    const el = document.createElement('div');
    el.className = `wb-chat-msg ${role}`;
    el.textContent = content;
    box.appendChild(el);
    box.scrollTop = box.scrollHeight;
}

async function sendWbChat() {
    const input = document.getElementById('wbChatInput');
    const text = input.value.trim();
    if (!text) return;
    const sendBtn = document.getElementById('wbChatSend');
    sendBtn.disabled = true;
    input.value = '';
    appendWbChatMsg('user', text);
    // 存入 chatHistory 用于报告
    if (!wishBottleData.chatHistory) wishBottleData.chatHistory = [];
    wishBottleData.chatHistory.push({ role: 'user', content: text });
    try {
        const result = await callWishChat(text);
        const reply = result?.reply || '';
        if (reply) {
            appendWbChatMsg('ai', reply);
            wishBottleData.chatHistory.push({ role: 'ai', content: reply });
        }
        // 实时更新步骤
        if (result?.update) {
            const { index, text: newText } = result.update;
            if (index >= 0 && index < wishBottleData.steps.length && !wishBottleData.steps[index].locked) {
                const old = wishBottleData.steps[index].text;
                wishBottleData.steps[index].history = [old, ...(wishBottleData.steps[index].history || [])];
                wishBottleData.steps[index].text = newText;
                saveWishBottleProgress();
                renderActiveSteps();
                // 提示步骤已更新
                const tip = document.createElement('div');
                tip.style.cssText = 'font-size:0.72rem;color:rgba(196,149,106,0.6);margin:4px 0 0 0;';
                tip.textContent = `↑ 步骤 ${index+1} 已更新`;
                document.getElementById('wbChatMessages').appendChild(tip);
            }
        }
        saveWishBottleProgress();
    } catch (e) {
        console.error('[WbChat]', e);
    } finally {
        sendBtn.disabled = false;

let _receiptBlobUrl = null;
function showReceiptPreview(canvas, filename) {

// ── 公共绘制工具 ──
const RECEIPT_W = 360, RECEIPT_SCALE = 2, RECEIPT_PAD = 24;

function makeReceiptCanvas(sections) {
    // sections: array of { type, ...props }
    // types: 'title', 'subtitle', 'divider', 'row', 'indent', 'footer', 'spacer'
    const S = RECEIPT_SCALE, W = RECEIPT_W * S, PAD = RECEIPT_PAD * S;
    const cvs = document.createElement('canvas');
    cvs.width = W;
    const ctx = cvs.getContext('2d');

    // ── 预先测高 ──
    function lineH(size) { return Math.round(size * S * 1.55); }
    let totalH = 28 * S; // top teeth
    sections.forEach(sec => {
        if (sec.type === 'title')    totalH += lineH(16) + 4 * S;
        else if (sec.type === 'subtitle') totalH += lineH(9);
        else if (sec.type === 'divider')  totalH += 18 * S;
        else if (sec.type === 'row')      totalH += lineH(10);
        else if (sec.type === 'indent')   totalH += lineH(9.5);
        else if (sec.type === 'footer')   totalH += lineH(9) + 4 * S;
        else if (sec.type === 'spacer')   totalH += (sec.h || 8) * S;
    });
    totalH += 36 * S; // bottom teeth + padding

    cvs.height = totalH;

    // ── 背景 ──
    ctx.fillStyle = '#f7f4ef';
    ctx.fillRect(0, 0, W, totalH);

    // ── 锯齿撕边（顶部）──
    const teeth = 14, tw = W / teeth;
    ctx.fillStyle = '#f7f4ef';
    ctx.beginPath();
    ctx.moveTo(0, -4);
    for (let i = 0; i <= teeth; i++) ctx.lineTo(i * tw, i % 2 === 0 ? 0 : 13 * S);
    ctx.lineTo(W, -4); ctx.closePath(); ctx.fill();

    let y = 28 * S;

    function dash(yy) {
        ctx.save();
        ctx.setLineDash([4 * S, 5 * S]);
        ctx.strokeStyle = 'rgba(80,50,20,0.18)';
        ctx.lineWidth = S;
        ctx.beginPath();
        ctx.moveTo(PAD, yy); ctx.lineTo(W - PAD, yy);
        ctx.stroke(); ctx.restore();
    }

    sections.forEach(sec => {
        ctx.textBaseline = 'alphabetic';
        if (sec.type === 'title') {
            ctx.font = `400 ${16 * S}px 'Noto Serif SC', serif`;
            ctx.fillStyle = '#1a0e06';
            ctx.textAlign = 'center';
            ctx.fillText(sec.text, W / 2, y + 16 * S); y += lineH(16) + 4 * S;

        } else if (sec.type === 'subtitle') {
            ctx.font = `400 ${9 * S}px 'SF Mono', 'Courier New', monospace`;
            ctx.fillStyle = '#7a5c3e';
            ctx.textAlign = 'center';
            ctx.fillText(sec.text, W / 2, y + 9 * S); y += lineH(9);

        } else if (sec.type === 'divider') {
            dash(y + 8 * S); y += 18 * S;

        } else if (sec.type === 'row') {
            const fs = sec.bold ? 10.5 : 10;
            ctx.font = `${sec.bold ? '500' : '400'} ${fs * S}px 'SF Mono', 'Courier New', monospace`;
            ctx.fillStyle = sec.dim ? '#a08060' : '#2a1608';
            // key left
            ctx.textAlign = 'left';
            ctx.fillText(sec.key, PAD, y + fs * S);
            // val right
            ctx.textAlign = 'right';
            ctx.fillText(sec.val, W - PAD, y + fs * S);
            // dots fill
            const keyW = ctx.measureText(sec.key).width;
            const valW = ctx.measureText(sec.val).width;
            const dotsArea = W - PAD * 2 - keyW - valW - 8 * S;
            if (dotsArea > 0) {
                ctx.fillStyle = 'rgba(80,50,20,0.22)';
                const dotStr = '· · · · · · · · · · · · · · · · · · · · · · · · ·';
                ctx.font = `400 ${8 * S}px 'SF Mono', monospace`;
                ctx.textAlign = 'left';
                // clip dots to available space
                let dots = '';
                for (const c of dotStr) {
                    if (ctx.measureText(dots + c).width > dotsArea) break;
                    dots += c;
                }
                ctx.fillText(dots, PAD + keyW + 4 * S, y + fs * S);
            }
            y += lineH(fs);

        } else if (sec.type === 'indent') {
            ctx.font = `400 ${9.5 * S}px 'SF Mono', 'Courier New', monospace`;
            ctx.fillStyle = '#5a3c22';
            ctx.textAlign = 'left';
            ctx.fillText(sec.text, PAD + 12 * S, y + 9.5 * S); y += lineH(9.5);

        } else if (sec.type === 'footer') {
            ctx.font = `400 ${9 * S}px 'Noto Serif SC', serif`;
            ctx.fillStyle = '#9a7050';
            ctx.textAlign = 'center';
            ctx.fillText(sec.text, W / 2, y + 9 * S); y += lineH(9) + 4 * S;

        } else if (sec.type === 'spacer') {
            y += (sec.h || 8) * S;
        }
    });

    // ── 锯齿撕边（底部）──
    ctx.fillStyle = '#f7f4ef';
    ctx.beginPath();
    ctx.moveTo(0, totalH + 4);
    for (let i = 0; i <= teeth; i++) ctx.lineTo(i * tw, totalH - (i % 2 === 0 ? 0 : 13 * S));
    ctx.lineTo(W, totalH + 4); ctx.closePath(); ctx.fill();

    return cvs;
}

function receiptNo(prefix) {
    const d = new Date();
    const ymd = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    return `${prefix}-${ymd}-${Math.floor(Math.random()*9000+1000)}`;
}
function nowStr() {
    return new Date().toLocaleString('zh-CN', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

// ════════════════════════════════
//  1. 对话小票
// ════════════════════════════════
function generateChatReceipt(msgEls) {
    const entries = msgEls.map(el => ({
        isUser: el.classList.contains('msg-user'),
        text: (el.innerText || el.textContent).replace(/🔊/g,'').replace(/\s+/g,' ').trim(),
    }));
    const userCount = entries.filter(e => e.isUser).length;
    const aiCount   = entries.filter(e => !e.isUser).length;
    const avgLen    = entries.reduce((s,e) => s + e.text.length, 0) / entries.length;
    const depth     = avgLen > 80 ? '★★★★☆' : avgLen > 40 ? '★★★☆☆' : '★★☆☆☆';
    const no        = receiptNo('CHAT');
    const snippet   = entries[0].text.slice(0, 20) + (entries[0].text.length > 20 ? '…' : '');

    const sections = [
        { type: 'spacer', h: 4 },
        { type: 'title',    text: '💬  对话小票' },
        { type: 'subtitle', text: `单号：${no}` },
        { type: 'subtitle', text: nowStr() },
        { type: 'divider' },
        { type: 'row', key: '消息总数', val: `${entries.length} 条` },
        { type: 'row', key: '你说了', val: `${userCount} 条` },
        { type: 'row', key: '灵犀说了', val: `${aiCount} 条` },
        { type: 'divider' },
        { type: 'row', key: '关键片段', val: '' },
        ...entries.map(e => ({ type: 'indent', text: `${e.isUser ? '你' : '灵犀'}："${e.text.slice(0,22)}${e.text.length>22?'…':''}"` })),
        { type: 'divider' },
        { type: 'row', key: '深度指数', val: depth },
        { type: 'spacer', h: 6 },
        { type: 'footer', text: `"${snippet}"` },
        { type: 'footer', text: '── 心镜 · 对话存档 ──' },
    ];
    const cvs = makeReceiptCanvas(sections);
    showReceiptPreview(cvs, `chat-${Date.now()}.png`);
}

function generateApiReceipt() {
    const u = lastApiUsage;
    const isDemo = !u;
    const pt  = u?.prompt_tokens     ?? 1240;
    const ct  = u?.completion_tokens ?? 380;

        { type: 'spacer', h: 4 },
        { type: 'title',    text: '🧾  调用小票' },
        { type: 'subtitle', text: `单号：${no}` },

        { type: 'row', key: '服务商', val: 'DeepSeek' },

        { type: 'divider' },
        { type: 'row', key: '项目',        val: 'Tokens' },
        { type: 'row', key: '输入 tokens', val: pt.toLocaleString() },
        { type: 'row', key: '输出 tokens', val: ct.toLocaleString() },

        { type: 'row', key: '合计 tokens', val: tot.toLocaleString(), bold: true },
        { type: 'row', key: '费用估算 (USD)', val: `$${cost}`, bold: true },
        { type: 'row', key: '计价日期', val: '2025-07', dim: true },
        { type: 'divider' },
        { type: 'spacer', h: 4 },
        { type: 'footer', text: isDemo ? '※ 无最新调用记录，展示演示数据' : '此为快照，不含税费' },

    showReceiptPreview(cvs, `api-${Date.now()}.png`);
}

async function dbWishSessionSave() {
    const doneSteps = wishBottleData.steps.filter(s => s.status === 'done');
    await fetch(API_URL + '/db/wish/session/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            user_id: LINGXI_UID,
            wish_text: wishBottleData.wish,
            direction: wishBottleData.chosenDirection || '',
            scope_json: JSON.stringify(wishBottleData.scope || {}),
            depth: wishBottleData.depth || '',
            depth_label: wishBottleData.depthLabel || '',
            steps_done: doneSteps.length,
            avoid_types: JSON.stringify(avoidTypes),

            ended_at: Date.now()
        })
    });
}

async function dbWishSessionList() {
    const resp = await fetch(API_URL + '/db/wish/session/list', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: LINGXI_UID })
    });
    const data = await resp.json();
    return data.sessions || [];
}

async function dbWishSessionAnalysis(sessions) {
    const resp = await fetch(API_URL + '/db/wish/session/analysis', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: LINGXI_UID, sessions })
    });
    const data = await resp.json();
    return data.analysis || '';
}

// ── 归档面板 ──

async function openWishArchive() {
    const panel = document.getElementById('wishArchivePanel');
    panel.classList.add('open');
    const listEl = document.getElementById('waList');
    const analysisEl = document.getElementById('waAnalysisArea');
    listEl.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.3);padding:32px 0;">加载中…</div>';
    analysisEl.style.display = 'none';
    try {
        const sessions = await dbWishSessionList();
        panel._sessions = sessions;
        renderArchiveList(sessions);
    } catch {
        listEl.innerHTML = '<div style="text-align:center;color:rgba(255,100,80,0.6);padding:32px 0;">加载失败，请稍后再试</div>';
    }
}

function renderArchiveList(sessions) {
    const listEl = document.getElementById('waList');
    if (!sessions.length) {
        listEl.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.25);padding:40px 0;font-size:0.85rem;">还没有完成的愿望记录</div>';
        return;
    }
    listEl.innerHTML = '';
    sessions.forEach(s => {
        const item = document.createElement('div');
        item.className = 'wa-item';

        const dateStr = s.ended_at ? new Date(s.ended_at).toLocaleDateString('zh-CN', { month:'numeric', day:'numeric' }) : '';
        const dirStr = s.direction ? `· ${s.direction}` : '';
        const depthStr = s.depth_label || (s.depth === 'short' ? '短期' : '长期');
        const wishShort = (s.wish_text || '').slice(0, 22) + ((s.wish_text || '').length > 22 ? '…' : '');

        item.innerHTML = `
            <div class="wa-item-wish">${wishShort}</div>
            <div class="wa-item-meta">
                <span>${dateStr}</span>
                <span>${depthStr} ${dirStr}</span>
                <span>完成 ${s.steps_done || 0} 步</span>
            </div>
            <button class="wa-continue-btn" data-idx="${sessions.indexOf(s)}">继续这个愿望</button>`;
        listEl.appendChild(item);
    });

    listEl.querySelectorAll('.wa-continue-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const session = sessions[parseInt(btn.dataset.idx)];
            loadWishFromArchive(session);
        });
    });
}

function loadWishFromArchive(session) {
    document.getElementById('wishArchivePanel').classList.remove('open');
    let scope = null;
    try { scope = JSON.parse(session.scope_json || '{}'); } catch { scope = {}; }
    wishBottleData = {
        wish: session.wish_text || '',
        chosenDirection: session.direction || '',
        scope: scope,
        steps: [],
        phase: 'scoping',
        depth: session.depth || '',
        depthLabel: session.depth_label || '',
        chatHistory: [],
        startedAt: Date.now(),
        _directions: []
    };
    // 同步 scope.depth 字段
    if (scope.depth) {
        wishBottleData.depth = scope.depth;
        wishBottleData.depthLabel = scope.depthLabel || session.depth_label || '';
    }
    saveWishBottleProgress();
    openWishBottle();
}

document.getElementById('wbArchiveBtn').addEventListener('click', openWishArchive);
document.getElementById('waClose').addEventListener('click', () => {
    document.getElementById('wishArchivePanel').classList.remove('open');
});
document.getElementById('wishArchivePanel').addEventListener('click', e => {
    if (e.target === document.getElementById('wishArchivePanel')) {
        document.getElementById('wishArchivePanel').classList.remove('open');
    }
});
document.getElementById('waAnalyzeBtn').addEventListener('click', async () => {
    const btn = document.getElementById('waAnalyzeBtn');
    const analysisEl = document.getElementById('waAnalysisArea');
    btn.disabled = true;
    btn.textContent = '分析中…';
    analysisEl.style.display = 'block';
    analysisEl.textContent = '…';
    try {
        const sessions = document.getElementById('wishArchivePanel')._sessions || [];
        const analysis = await dbWishSessionAnalysis(sessions);
        analysisEl.textContent = analysis || '暂时没有足够的数据进行分析。';
    } catch {
        analysisEl.textContent = '分析失败，请稍后再试。';
    } finally {
        btn.disabled = false;
        btn.textContent = '分析我的愿望';
    }
});
